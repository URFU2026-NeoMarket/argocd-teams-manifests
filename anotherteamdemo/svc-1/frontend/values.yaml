# Values для чарта `simple` (URFU2026-NeoMarket/helm-charts).
# Каталог компонента = один values.yaml (схема доставки B: общий чарт + values).
#
# commandID здесь НЕ указывается намеренно: он обязан совпадать с namespace
# и инъектируется ApplicationSet'ом из пути (segment[0]) через helm.parameters —
# единственный источник истины путь, без дублирования и дрейфа.
#
# Публичный адрес (ingress.enabled=true) → cert-manager выпустит TLS сам:
#   host = <commandID>-<release> = teamdemo-svc-1-frontend.2026.tochka-urfu.tech
replicaCount: 1
image:
  repository: traefik/whoami   # лёгкая заглушка, отвечает на HTTP
  tag: "v1.10.4"
service:
  port: 80
ingress:
  enabled: true
resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 50m
    memory: 32Mi
