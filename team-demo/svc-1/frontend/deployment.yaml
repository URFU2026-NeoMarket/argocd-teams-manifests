apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: svc-1-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-1-frontend
  template:
    metadata:
      labels:
        app: svc-1-frontend
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.4   # лёгкая заглушка
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
